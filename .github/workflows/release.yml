name: Release VPM Package

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r .version Packages/com.sizimityper.headlight-shader/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create zip for VPM
        run: |
          cd Packages/com.sizimityper.headlight-shader
          zip -r ../../com.sizimityper.headlight-shader-${{ steps.version.outputs.version }}.zip .
      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: com.sizimityper.headlight-shader-${{ steps.version.outputs.version }}.zip
      - name: Trigger VPM listing update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.VPM_LISTING_TOKEN }}
          repository: sizimityper/vpm
          event-type: update-listing
